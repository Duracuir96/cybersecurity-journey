# .github/workflows/tests.yml

name: CI — Cloud Log Analyzer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'cloud-log-analyzer/**' 
  pull_request:
    branches: [ main ]
    paths:
      - 'cloud-log-analyzer/**' 


jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloud-log-analyzer

    steps:
      # Step 1 — checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 — install Python 3.9
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3 — install all dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Step 4 — run unit tests only
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    # Integration tests run only after unit tests pass
    needs: unit-tests

    defaults:
      run:
        working-directory: cloud-log-analyzer

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Step 4 — run integration tests only
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short